title: "Valerii Korobeinikov"
description: "Enterprise Architect and IT Consultant"
url: "https://vkgeorgia.github.io"
baseurl: ""
lang: en

# Minimal Mistakes Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site Author
author:
  name: "Valerii Korobeinikov"
  avatar: "/images/108.jpg"
  bio: "Enterprise Architect & Business Analyst with 20+ years of experience"
  location: "Georgia"
  email: "vkgeorgia@icloud.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/valeriikorobeinikov/"
    - label: "Schedule Meeting"
      icon: "fas fa-fw fa-calendar"
      url: "https://calendar.app.google/YwmXZytfSQ2qWX4Z7"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins (only GitHub Pages supported plugins)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme
  - jekyll-include-cache

# Include digital-avatar frontend files
include:
  - digital-avatar/frontend

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - _site/
  - sources/
  - knowledge-base/*/sources/
  - digital-avatar/backend
  - digital-avatar/docs
  - digital-avatar/.env
  - digital-avatar/google_credentials.json
  - digital-avatar/README.md

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
