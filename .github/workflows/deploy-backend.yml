name: Deploy AI Avatar Backend to Cloud Run

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
      - test-minima
    paths:
      - 'digital-avatar/backend/**'
      - 'knowledge-base/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Regenerate knowledge base from DB
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          pip install "psycopg[binary]" --quiet
          python scripts/generate_kb.py

      - name: Generate embeddings (pgvector)
        continue-on-error: true
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_embeddings.py

      - name: Sync knowledge base to backend
        run: |
          rm -rf digital-avatar/backend/knowledge_base
          mkdir -p digital-avatar/backend/knowledge_base
          cp -r knowledge-base/* digital-avatar/backend/knowledge_base/
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io
      
      - name: Build and push Docker image
        run: |
          cd digital-avatar/backend
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-avatar:latest .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-avatar:latest
      
      # Важно: весь --set-env-vars в кавычках, чтобы отрицательный TELEGRAM_CHAT_ID (группы)
      # и двоеточие в токене не ломали разбор shell / gcloud.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-avatar \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-avatar:latest" \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},NEON_DATABASE_URL=${{ secrets.NEON_DATABASE_URL }},TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},RESUME_API_KEY=${{ secrets.RESUME_API_KEY }}"

      - name: Verify deployment (health check)
        run: |
          echo "Waiting for Cloud Run to serve traffic..."
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ai-avatar-103512681014.us-central1.run.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
